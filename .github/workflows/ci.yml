name: CI Liga Maestre

"on":
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  frontend-angular:
    name: Frontend Angular
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar tests Angular
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build Angular
        run: npm run build