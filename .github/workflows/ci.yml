name: CI Liga Maestre

"on":
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  frontend-angular:
    name: Frontend Angular
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: liga-maestre-fronted

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: liga-maestre-fronted/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests Angular
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build Angular
        run: npm run build

  backend-laravel:
    name: Backend Laravel
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: liga-maestre-backend

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, dom, fileinfo, sqlite3, pdo_sqlite
          coverage: none

      - name: Copiar archivo de entorno
        run: cp .env.example .env

      - name: Instalar Composer
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generar APP_KEY
        run: php artisan key:generate

      - name: Crear base SQLite para testing
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Ejecutar migraciones
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force

      - name: Ejecutar tests Laravel
        env:
          APP_ENV: testing
          CACHE_DRIVER: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test
